# nginx reverse proxy for deploy/lambda/server.py. Copy to
# /etc/nginx/sites-available/minicode-demo, symlink into sites-enabled, edit
# server_name, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# Start with plain HTTP against the bare IP if you don't have a domain
# pointed here yet; once you do, run `sudo certbot --nginx -d api.example.com`
# -- certbot rewrites this file in place to add the TLS server block.

server {
    listen 80;
    server_name api.example.com;  # or the VPS's bare IP for now

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
